apiVersion: apps/v1
kind: Deployment
metadata:
  name: ard-mcp
  namespace: ard-mcp
  labels:
    app: ard-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ard-mcp
  template:
    metadata:
      labels:
        app: ard-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ard-mcp
          image: ghcr.io/jakolo121/ard-mcp:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ard-mcp-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
